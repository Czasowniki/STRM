<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    <title>STRM - Zegar</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :root { --bg-color: #ffffff; --ui-white: #ffffff; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100vh; background-color: var(--bg-color); transition: background-color 0.5s ease; overflow: hidden; font-family: sans-serif; -webkit-font-smoothing: antialiased; }
        body.dark-mode { --bg-color: #121212; }
        model-viewer { width: 100%; height: 100%; background-color: transparent; outline: none; display: block; }
        model-viewer::part(default-ar-button) { display: none !important; }

        .ui-element {
            position: absolute; background: none; border: none; padding: 0;
            cursor: pointer; z-index: 100;
            mix-blend-mode: difference;
            color: var(--ui-white) !important; 
            fill: var(--ui-white) !important;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        .brand-btn { top: 32px; font-weight: 700; font-size: 15px; letter-spacing: 0.2em; text-transform: uppercase; }
        .brand-label { left: 32px; }
        .brand-czasowniki { right: 32px; text-align: right; }

        .info-panel {
            position: absolute; top: 65px; color: var(--ui-white); mix-blend-mode: difference;
            opacity: 0; pointer-events: none; transition: opacity 0.4s ease; z-index: 90;
            font-weight: 200; font-size: 14px; line-height: 1.5;
        }
        .info-panel.visible { opacity: 1; pointer-events: auto; }
        #panel-strm { left: 32px; }
        #panel-czasowniki { right: 32px; text-align: right; max-width: 320px; }

        .icon-btn { width: 28px; height: 28px; bottom: 40px; display: flex; align-items: center; justify-content: center; }
        .btn-theme { left: 32px; }
        .btn-pause { left: 36%; transform: translateX(-50%); }
        .btn-action { left: 63%; transform: translateX(-50%); }
        .btn-reset { right: 32px; }

        @media (min-width: 769px) {
            .brand-btn { font-size: 19px; top: 40px; }
            .info-panel { font-size: 16px; top: 85px; }
            .icon-btn { width: 32px; height: 32px; }
        }
    </style>
</head>
<body>

    <button class="ui-element brand-btn brand-label" id="btn-strm">STRM</button>
    <div id="panel-strm" class="info-panel">Mechanizm kwarcowy<br>250 x 250 x 350 mm<br>Druk 3D PLA</div>

    <button class="ui-element brand-btn brand-czasowniki" id="btn-cz">CZASOWNIKI</button>
    <div id="panel-cz" class="info-panel">Obiekty kinetyczne badające granicę<br>między inżynierią a absurdem.</div>

    <button class="ui-element icon-btn btn-theme" id="btn-th">
        <svg viewBox="0 0 24 24" width="24" height="24"><path d="M12 2C6.47 2 2 6.47 2 12s4.47 10 10 10 10-4.47 10-10S17.53 2 12 2zm0 18V4c4.42 0 8 3.58 8 8s-3.58 8-8 8z"/></svg>
    </button>

    <button class="ui-element icon-btn btn-pause" id="btn-p">
        <svg viewBox="0 0 24 24" width="24" height="24" id="svg-p"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
    </button>

    <button class="ui-element icon-btn btn-action" id="btn-a">
        <span id="ar-txt" style="display:none; font-weight:800; font-size:16px;">AR</span>
        <svg id="fs-svg" viewBox="0 0 24 24" width="24" height="24" style="display:none;"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
    </button>

    <button class="ui-element icon-btn btn-reset" id="btn-r">
        <svg viewBox="0 0 24 24" width="24" height="24"><circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="3" fill="currentColor"/></svg>
    </button>

    <model-viewer 
        id="mv"
        src="STRM.glb" 
        ar ar-modes="webxr scene-viewer quick-look" 
        camera-controls disable-pan
        shadow-intensity="1"
        autoplay
        camera-orbit="180deg 75deg 140%" 
        camera-target="0m 0.2m 0m"
        loading="eager">
    </model-viewer>

    <script>
        const mv = document.querySelector('#mv');
        const get = (id) => document.getElementById(id);

        get('btn-r').onclick = () => {
            mv.cameraOrbit = "180deg 75deg 140%";
            mv.cameraTarget = "0m 0.2m 0m";
        };

        get('btn-strm').onclick = () => {
            get('panel-cz').classList.remove('visible');
            get('panel-strm').classList.toggle('visible');
        };

        get('btn-cz').onclick = () => {
            get('panel-strm').classList.remove('visible');
            get('panel-cz').classList.toggle('visible');
        };

        get('btn-th').onclick = () => {
            document.body.classList.toggle('dark-mode');
            mv.exposure = document.body.classList.contains('dark-mode') ? "1.6" : "2.8";
        };

        get('btn-p').onclick = () => {
            if (mv.paused) { mv.play(); } else { mv.pause(); }
        };

        const isMob = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        if (isMob) {
            get('ar-txt').style.display = 'block';
            get('btn-a').onclick = () => mv.activateAR();
        } else {
            get('fs-svg').style.display = 'block';
            get('btn-a').onclick = () => {
                if (!document.fullscreenElement) document.documentElement.requestFullscreen();
                else document.exitFullscreen();
            };
        }
    </script>
</body>
</html>
